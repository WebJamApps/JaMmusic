version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:24.15-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Test install
          command: npm install
      - run:
          name: typecheck
          command: npm run typecheck
      - run:
          name: run all tests
          command: npm test
      - store_artifacts:
          path: coverage
      - run:
          name: Smoketest - clean install without devDependencies
          command: |
            rm -rf node_modules package-lock.json
            npm install --omit=dev
