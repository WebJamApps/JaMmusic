version: 2.1
jobs:
  build:
    docker:
      # App targets Node 24.18 (engines/.nvmrc); the matching browsers image is
      # now published, so CI runs on the same Node line as the app + local dev.
      - image: cimg/node:24.18-browsers
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Test install
          command: npm install
      - run:
          name: typecheck
          command: npm run typecheck
      - run:
          name: run all tests
          command: npm test
      - store_artifacts:
          path: coverage
      - run:
          name: Smoketest - clean install without devDependencies
          command: |
            rm -rf node_modules package-lock.json
            npm install --omit=dev

workflows:
  build-and-test:
    jobs:
      - build
